# ================================================
# CONFIGURAÇÃO DO CERTBOT RENEW
# ================================================

# Para renovação automática de certificado SSL, adicione ao crontab:
# 0 12 * * * /usr/bin/certbot renew --quiet

# ================================================
# INSTALAÇÃO DE CERTIFICADO SSL COM LET'S ENCRYPT
# ================================================

# 1. Instalar Certbot:
#    sudo apt-get install certbot python3-certbot-nginx
#
# 2. Obter certificado:
#    sudo certbot certonly --nginx -d maiscontabilidade.com.br -d www.maiscontabilidade.com.br
#
# 3. Configurar renovação automática:
#    sudo certbot renew --dry-run

