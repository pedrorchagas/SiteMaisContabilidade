# Configuração Nginx
# Para servidores Nginx - adicione este bloco ao arquivo de configuração do seu domínio

server {
    listen 80;
    listen [::]:80;
    
    # Redirecionar HTTP para HTTPS (descomente se usar SSL)
    # return 301 https://$server_name$request_uri;
    
    server_name www.maiscontabilidade.com.br maiscontabilidade.com.br;
    
    root /var/www/maiscontabilidade;
    index index.html index.htm;
    
    # ================================================
    # COMPRESSÃO GZIP
    # ================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/x-font application/x-font-truetype font/opentype 
               image/svg+xml;
    
    # ================================================
    # CACHE ESTÁTICO
    # ================================================
    
    # Cache de imagens - 1 mês
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Cache de CSS e JavaScript - 1 mês
    location ~* \.(css|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Cache de fonts - 1 ano
    location ~* \.(eot|ttf|woff|woff2|otf)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Não cachear HTML
    location ~* \.(html|htm)$ {
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }
    
    # ================================================
    # REWRITE RULES
    # ================================================
    
    # Remover extensão .html
    if ($request_filename ~* ^(.*)\.html$) {
        rewrite ^(.*)\.html$ $1 permanent;
    }
    
    # Adicionar barra no final dos diretórios
    if (!-d $request_filename) {
        rewrite ^/(.+)/$ /$1 permanent;
    }
    
    # Reescrever para index.html quando arquivo não existe
    try_files $uri $uri/ /index.html;
    
    # ================================================
    # SEGURANÇA
    # ================================================
    
    # Proteger arquivos sensíveis
    location ~ \.(env|git|log|sql|zip)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Desabilitar acesso a diretórios específicos
    location ~ ^/(admin|private|config)/ {
        deny all;
    }
    
    # ================================================
    # CABEÇALHOS DE SEGURANÇA
    # ================================================
    
    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://maps.googleapis.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://maps.googleapis.com; frame-src https://www.google.com;" always;
    
    # Evitar clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Prevenir MIME-sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Ativar proteção XSS
    add_header X-XSS-Protection "1; mode=block" always;
    
    # HSTS (HTTPS Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Referenciar política
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # ================================================
    # LOGGING
    # ================================================
    
    access_log /var/log/nginx/maiscontabilidade_access.log;
    error_log /var/log/nginx/maiscontabilidade_error.log;
    
    # Não logar imagens e fontes
    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        access_log off;
    }
    
    # ================================================
    # PÁGINAS DE ERRO
    # ================================================
    
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}

